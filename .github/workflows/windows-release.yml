name: windows-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  MPV_WINBUILD_TAG: "20260303"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        shell: pwsh
        run: |
          uv sync --dev

      - name: Download pinned libmpv runtime (GitHub)
        shell: pwsh
        run: |
          $tag = "${{ env.MPV_WINBUILD_TAG }}"
          $assetPattern = "^mpv-dev-x86_64-$tag-.*\.7z$"
          $coreRegex = "^(libmpv|mpv)(-\d+)?\.dll$"

          Write-Host "[mpv] release tag: $tag"

          $headers = @{ "User-Agent" = "transcriby-ci" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/tags/$tag" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -match $assetPattern } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find asset matching '$assetPattern' in shinchiro release tag '$tag'"
          }

          Write-Host "[mpv] selected asset: $($asset.name)"

          $archive = Join-Path $env:RUNNER_TEMP $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive
          Write-Host "[mpv] archive path: $archive"

          uv run python -m pip install --disable-pip-version-check py7zr

          $extractDir = Join-Path $env:RUNNER_TEMP "mpv-dev-$tag"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          New-Item -ItemType Directory -Path $extractDir | Out-Null

          uv run python -c "import pathlib,py7zr,sys; archive=pathlib.Path(sys.argv[1]); outdir=pathlib.Path(sys.argv[2]); py7zr.SevenZipFile(archive, mode='r').extractall(path=outdir); print(outdir)" \"$archive\" \"$extractDir\"
          Write-Host "[mpv] extracted to: $extractDir"

          Write-Host "[mpv] DLLs under extract dir (first 120):"
          $allDlls = Get-ChildItem -Path $extractDir -Filter *.dll -File -Recurse -ErrorAction SilentlyContinue
          $allDlls | Select-Object -First 120 | ForEach-Object { Write-Host " - $($_.FullName)" }

          $coreDll = $allDlls | Where-Object { $_.Name -match $coreRegex } | Select-Object -First 1
          if (-not $coreDll) {
            throw "libmpv core DLL not found in extracted package"
          }

          $mpvDir = $coreDll.DirectoryName
          Write-Host "[mpv] selected core DLL: $($coreDll.FullName)"
          Write-Host "[mpv] runtime dir DLLs:"
          Get-ChildItem -Path $mpvDir -Filter *.dll -File -ErrorAction SilentlyContinue |
            Sort-Object Name |
            ForEach-Object { Write-Host "   - $($_.Name)" }

          "TRANSCRIBY_MPV_DIR=$mpvDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$mpvDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools\package_windows.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transcriby-windows
          path: |
            Transcriby-Windows.zip
            SHA256SUMS.txt

      - name: Publish nightly release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body: |
            Automated nightly build from `main`.
            Commit: ${{ github.sha }}
          files: |
            Transcriby-Windows.zip
            SHA256SUMS.txt

      - name: Publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            Transcriby-Windows.zip
            SHA256SUMS.txt
