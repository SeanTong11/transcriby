name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sync dependencies
        shell: pwsh
        run: |
          uv sync --dev

      - name: Install mpv runtime (Chocolatey)
        shell: pwsh
        run: |
          choco install mpvio.install -y --no-progress
          $mpvExe = (Get-Command mpv.exe -ErrorAction Stop).Source
          $mpvDir = Split-Path $mpvExe -Parent
          "TRANSCRIBY_MPV_DIR=$mpvDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using TRANSCRIBY_MPV_DIR=$mpvDir"

      - name: Build and package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools\package_windows.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transcriby-windows
          path: |
            Transcriby-Windows.zip
            SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Transcriby-Windows.zip
            SHA256SUMS.txt
