name: windows-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  MPV_WINBUILD_TAG: "20260303"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        shell: pwsh
        run: |
          uv sync --dev

      - name: Download pinned libmpv runtime (GitHub)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ env.MPV_WINBUILD_TAG }}"
          $assetPattern = "^mpv-dev-x86_64-$tag-.*\.7z$"
          $coreRegex = "^(libmpv|mpv)(-\d+)?\.dll$"

          Write-Host "[mpv] release tag: $tag"

          $headers = @{ "User-Agent" = "transcriby-ci" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/tags/$tag" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -match $assetPattern } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find asset matching '$assetPattern' in shinchiro release tag '$tag'"
          }

          Write-Host "[mpv] selected asset: $($asset.name)"

          $archive = Join-Path $env:RUNNER_TEMP $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive
          Write-Host "[mpv] archive path: $archive"

          $extractDir = Join-Path $env:RUNNER_TEMP "mpv-dev-$tag"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          New-Item -ItemType Directory -Path $extractDir | Out-Null

          $sevenZip = @(
            "$env:ProgramFiles\7-Zip\7z.exe",
            "$env:ProgramFiles(x86)\7-Zip\7z.exe"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $sevenZip) {
            $sevenZipCmd = Get-Command 7z.exe -ErrorAction SilentlyContinue
            if ($sevenZipCmd) {
              $sevenZip = $sevenZipCmd.Source
            }
          }
          if (-not $sevenZip) {
            throw "7z.exe not found on runner. Cannot extract mpv-dev archive."
          }
          Write-Host "[mpv] using 7z: $sevenZip"

          & $sevenZip x "$archive" "-o$extractDir" -y
          if ($LASTEXITCODE -ne 0) {
            throw "7z extraction failed with exit code $LASTEXITCODE"
          }

          Write-Host "[mpv] extracted to: $extractDir"

          Write-Host "[mpv] DLLs under extract dir (first 120):"
          $allDlls = Get-ChildItem -Path $extractDir -Filter *.dll -File -Recurse -ErrorAction SilentlyContinue
          $allDlls | Select-Object -First 120 | ForEach-Object { Write-Host " - $($_.FullName)" }

          $coreDll = $allDlls | Where-Object { $_.Name -match $coreRegex } | Select-Object -First 1
          if (-not $coreDll) {
            throw "libmpv core DLL not found in extracted package"
          }

          $mpvDir = $coreDll.DirectoryName
          Write-Host "[mpv] selected core DLL: $($coreDll.FullName)"
          Write-Host "[mpv] runtime dir DLLs:"
          Get-ChildItem -Path $mpvDir -Filter *.dll -File -ErrorAction SilentlyContinue |
            Sort-Object Name |
            ForEach-Object { Write-Host "   - $($_.Name)" }

          "TRANSCRIBY_MPV_DIR=$mpvDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$mpvDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools\package_windows.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transcriby-windows
          path: |
            Transcriby-Windows.zip
            SHA256SUMS.txt

      - name: Publish nightly release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          function Upload-WithRetry {
            param(
              [Parameter(Mandatory = $true)][string]$Tag,
              [Parameter(Mandatory = $true)][string[]]$Files,
              [int]$MaxAttempts = 5
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              Write-Host "[release] upload attempt $attempt/$MaxAttempts for tag '$Tag'"
              gh release upload $Tag @Files --clobber
              if ($LASTEXITCODE -eq 0) {
                return
              }

              if ($attempt -eq $MaxAttempts) {
                throw "Failed to upload assets to release '$Tag' after $MaxAttempts attempts."
              }

              $sleep = 5 * $attempt
              Write-Warning "[release] upload failed, retrying in ${sleep}s..."
              Start-Sleep -Seconds $sleep
            }
          }

          $files = @("Transcriby-Windows.zip", "SHA256SUMS.txt")
          $tag = "nightly"
          $title = "Nightly"
          $notes = "Automated nightly build from main.`nCommit: $env:GITHUB_SHA"

          gh release view $tag *> $null
          $exists = ($LASTEXITCODE -eq 0)
          if ($exists) {
            gh release edit $tag --title $title --prerelease --latest=false --notes $notes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to edit nightly release metadata."
            }
          } else {
            gh release create $tag --title $title --prerelease --latest=false --notes $notes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create nightly release."
            }
          }

          Upload-WithRetry -Tag $tag -Files $files

      - name: Publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          function Upload-WithRetry {
            param(
              [Parameter(Mandatory = $true)][string]$Tag,
              [Parameter(Mandatory = $true)][string[]]$Files,
              [int]$MaxAttempts = 5
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              Write-Host "[release] upload attempt $attempt/$MaxAttempts for tag '$Tag'"
              gh release upload $Tag @Files --clobber
              if ($LASTEXITCODE -eq 0) {
                return
              }

              if ($attempt -eq $MaxAttempts) {
                throw "Failed to upload assets to release '$Tag' after $MaxAttempts attempts."
              }

              $sleep = 5 * $attempt
              Write-Warning "[release] upload failed, retrying in ${sleep}s..."
              Start-Sleep -Seconds $sleep
            }
          }

          $files = @("Transcriby-Windows.zip", "SHA256SUMS.txt")
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) {
            throw "GITHUB_REF_NAME is empty."
          }

          gh release view $tag *> $null
          $exists = ($LASTEXITCODE -eq 0)
          if (-not $exists) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create tag release '$tag'."
            }
          }

          Upload-WithRetry -Tag $tag -Files $files
