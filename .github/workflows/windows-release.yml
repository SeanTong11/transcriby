name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sync dependencies
        shell: pwsh
        run: |
          uv sync --dev

      - name: Install mpv runtime (Chocolatey)
        shell: pwsh
        run: |
          $coreNames = @("libmpv-2.dll", "mpv-2.dll", "mpv-1.dll")

          function Find-MpvCoreDir([string[]]$roots) {
            foreach ($root in $roots) {
              if (-not (Test-Path $root)) { continue }
              foreach ($core in $coreNames) {
                $found = Get-ChildItem -Path $root -Filter $core -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($found) { return $found.DirectoryName }
              }
            }
            return $null
          }

          $chocoRoot = if ($env:ChocolateyInstall) { $env:ChocolateyInstall } else { "C:\ProgramData\chocolatey" }
          $chocoRoots = @(
            (Join-Path $chocoRoot "lib\mpvio.install\tools"),
            (Join-Path $chocoRoot "lib\mpvio\tools"),
            (Join-Path $chocoRoot "bin")
          )

          Write-Host "Installing mpv via Chocolatey..."
          choco install mpvio.install -y --no-progress

          $mpvDir = Find-MpvCoreDir -roots $chocoRoots
          if (-not $mpvDir) {
            Write-Warning "Chocolatey mpv install did not provide libmpv core DLLs. Falling back to Scoop mpv-git..."

            Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
            if (-not (Get-Command scoop -ErrorAction SilentlyContinue)) {
              irm get.scoop.sh | iex
            }

            scoop bucket add extras | Out-Null
            scoop install mpv-git

            $scoopRoot = Join-Path $env:USERPROFILE "scoop"
            $scoopRoots = @(
              (Join-Path $scoopRoot "apps\mpv-git\current"),
              (Join-Path $scoopRoot "apps\mpv\current"),
              (Join-Path $scoopRoot "shims")
            )
            $mpvDir = Find-MpvCoreDir -roots $scoopRoots
          }

          if (-not $mpvDir) {
            Write-Host "Could not locate core mpv DLLs. Dumping discovered DLL files for diagnostics..."
            $allRoots = $chocoRoots + (Join-Path $env:USERPROFILE "scoop\apps") + (Join-Path $env:USERPROFILE "scoop\shims")
            foreach ($r in $allRoots) {
              if (-not (Test-Path $r)) { continue }
              Write-Host "--- DLLs under $r ---"
              Get-ChildItem -Path $r -Filter *.dll -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 120 | ForEach-Object { Write-Host $_.FullName }
            }
            throw "libmpv core DLLs not found after Chocolatey/Scoop install"
          }

          "TRANSCRIBY_MPV_DIR=$mpvDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$mpvDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Using TRANSCRIBY_MPV_DIR=$mpvDir"

      - name: Build and package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools\package_windows.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transcriby-windows
          path: |
            Transcriby-Windows.zip
            SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Transcriby-Windows.zip
            SHA256SUMS.txt
