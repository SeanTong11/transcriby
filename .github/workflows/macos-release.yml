name: macos-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install libmpv (mpv)
        shell: bash
        run: |
          brew install mpv
          libmpv_path="$(brew --prefix mpv)/lib/libmpv.dylib"
          if [[ ! -f "${libmpv_path}" ]]; then
            libmpv_path="$(brew --prefix)/lib/libmpv.dylib"
          fi
          if [[ ! -f "${libmpv_path}" ]]; then
            echo "::error::libmpv.dylib not found after brew install mpv"
            exit 1
          fi
          libmpv_dir="$(dirname "${libmpv_path}")"
          echo "MPV_LIBRARY=${libmpv_path}" >> "${GITHUB_ENV}"
          echo "TRANSCRIBY_MPV_LIBRARY=${libmpv_path}" >> "${GITHUB_ENV}"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${libmpv_dir}:${DYLD_FALLBACK_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"
          echo "Using MPV_LIBRARY=${libmpv_path}"

      - name: Sync dependencies
        shell: bash
        run: |
          uv sync --dev

      - name: Smoke check player import
        shell: bash
        run: |
          uv run python -c "from transcriby.player import slowPlayer; print('slowPlayer import OK')"

      - name: Build app bundle (PyInstaller)
        shell: bash
        run: |
          uv run python -m PyInstaller \
            --name Transcriby \
            --windowed \
            --noconfirm \
            --clean \
            --add-data "transcriby/resources:resources" \
            --add-data "transcriby/locales:locales" \
            --hidden-import mpv \
            --hidden-import soundfile \
            --hidden-import scipy \
            --hidden-import numpy \
            --hidden-import customtkinter \
            --hidden-import CTkMessagebox \
            --hidden-import CTkToolTip \
            --hidden-import tkinterdnd2 \
            --hidden-import platform_utils \
            transcriby-launch.py

      - name: Package artifact
        shell: bash
        run: |
          app_path="dist/Transcriby.app"
          if [[ ! -d "${app_path}" ]]; then
            echo "::error::Expected app bundle not found: ${app_path}"
            ls -la dist || true
            exit 1
          fi

          mkdir -p out
          zip_name="Transcriby-macOS-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "out/${zip_name}"
          shasum -a 256 "out/${zip_name}" > "out/SHA256SUMS-${{ matrix.arch }}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transcriby-macos-${{ matrix.arch }}
          path: |
            out/Transcriby-macOS-${{ matrix.arch }}.zip
            out/SHA256SUMS-${{ matrix.arch }}.txt

      - name: Publish nightly release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body: |
            Automated nightly build from `main`.
            Commit: ${{ github.sha }}
          files: |
            out/Transcriby-macOS-${{ matrix.arch }}.zip
            out/SHA256SUMS-${{ matrix.arch }}.txt

      - name: Publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            out/Transcriby-macOS-${{ matrix.arch }}.zip
            out/SHA256SUMS-${{ matrix.arch }}.txt
