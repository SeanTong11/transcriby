name: macos-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set build version metadata
        shell: bash
        run: |
          python3 tools/set_build_version.py
          cat transcriby/build_version.py

      - name: Install libmpv (mpv)
        shell: bash
        run: |
          brew install mpv
          libmpv_path="$(brew --prefix mpv)/lib/libmpv.dylib"
          if [[ ! -f "${libmpv_path}" ]]; then
            libmpv_path="$(brew --prefix)/lib/libmpv.dylib"
          fi
          if [[ ! -f "${libmpv_path}" ]]; then
            echo "::error::libmpv.dylib not found after brew install mpv"
            exit 1
          fi
          libmpv_dir="$(dirname "${libmpv_path}")"
          echo "MPV_LIBRARY=${libmpv_path}" >> "${GITHUB_ENV}"
          echo "TRANSCRIBY_MPV_LIBRARY=${libmpv_path}" >> "${GITHUB_ENV}"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${libmpv_dir}:${DYLD_FALLBACK_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"
          echo "Using MPV_LIBRARY=${libmpv_path}"

      - name: Sync dependencies
        shell: bash
        run: |
          uv sync --dev

      - name: Smoke check player import
        shell: bash
        run: |
          uv run python -c "from transcriby.player import slowPlayer; print('slowPlayer import OK')"

      - name: Build app bundle (PyInstaller)
        shell: bash
        run: |
          uv run python -m PyInstaller \
            --name Transcriby \
            --windowed \
            --noconfirm \
            --clean \
            --add-binary "${MPV_LIBRARY}:lib" \
            --add-data "transcriby/resources:resources" \
            --add-data "transcriby/locales:locales" \
            --hidden-import mpv \
            --hidden-import soundfile \
            --hidden-import scipy \
            --hidden-import numpy \
            --hidden-import PySide6 \
            --hidden-import platform_utils \
            transcriby-launch.py

      - name: Bundle libmpv into app
        shell: bash
        run: |
          app_path="dist/Transcriby.app"
          frameworks_dir="${app_path}/Contents/Frameworks"
          bundled_lib="${frameworks_dir}/libmpv.dylib"

          if [[ ! -d "${app_path}" ]]; then
            echo "::error::Expected app bundle not found: ${app_path}"
            ls -la dist || true
            exit 1
          fi

          if [[ -z "${MPV_LIBRARY:-}" || ! -f "${MPV_LIBRARY}" ]]; then
            echo "::error::MPV_LIBRARY is missing or invalid: '${MPV_LIBRARY:-}'"
            exit 1
          fi

          mkdir -p "${frameworks_dir}"
          cp -f "${MPV_LIBRARY}" "${bundled_lib}"
          chmod 755 "${bundled_lib}"
          echo "Bundled libmpv: ${bundled_lib}"

      - name: Bundle and rebase libmpv dylib dependencies
        shell: bash
        run: |
          python3 tools/macos_bundle_dylibs.py \
            --app "dist/Transcriby.app" \
            --root "dist/Transcriby.app/Contents/Frameworks/libmpv.dylib"

      - name: Verify bundled libmpv exists
        shell: bash
        run: |
          bundled_lib="dist/Transcriby.app/Contents/Frameworks/libmpv.dylib"
          if [[ ! -f "${bundled_lib}" ]]; then
            echo "::error::Bundled libmpv not found: ${bundled_lib}"
            find dist/Transcriby.app -maxdepth 4 -type f | sed -n '1,200p' || true
            exit 1
          fi
          ls -la "${bundled_lib}"
          otool -L "${bundled_lib}" || true

      - name: Verify no external Homebrew-style refs remain
        shell: bash
        run: |
          set -euo pipefail
          app_fw="dist/Transcriby.app/Contents/Frameworks"
          if [[ ! -d "${app_fw}" ]]; then
            echo "::error::Frameworks directory missing: ${app_fw}"
            exit 1
          fi

          bad_refs="$(
            find "${app_fw}" -type f -name "*.dylib" -print0 \
              | xargs -0 otool -L \
              | grep -E '^\s+/(opt/homebrew|usr/local|opt/local)/' || true
          )"
          if [[ -n "${bad_refs}" ]]; then
            echo "::error::External dylib references remain:"
            echo "${bad_refs}"
            exit 1
          fi

      - name: Smoke check bundled app without system mpv
        shell: bash
        run: |
          set -euo pipefail

          app_exe="dist/Transcriby.app/Contents/MacOS/Transcriby"
          if [[ ! -x "${app_exe}" ]]; then
            echo "::error::App executable not found: ${app_exe}"
            exit 1
          fi

          declare -a restores=()
          restore_all() {
            local entry
            local orig
            local bak
            for entry in "${restores[@]}"; do
              orig="${entry%%:::*}"
              bak="${entry#*:::}"
              if [[ -f "${bak}" ]]; then
                mv "${bak}" "${orig}"
              fi
            done
          }
          trap restore_all EXIT

          mpv_prefix="$(brew --prefix mpv)"
          brew_prefix="$(brew --prefix)"
          candidate_paths=(
            "${mpv_prefix}/lib/libmpv.dylib"
            "${mpv_prefix}/lib/libmpv.2.dylib"
            "${brew_prefix}/lib/libmpv.dylib"
            "${brew_prefix}/lib/libmpv.2.dylib"
            "/opt/homebrew/lib/libmpv.dylib"
            "/opt/homebrew/lib/libmpv.2.dylib"
            "/usr/local/lib/libmpv.dylib"
            "/usr/local/lib/libmpv.2.dylib"
          )

          for lib_path in "${candidate_paths[@]}"; do
            if [[ -f "${lib_path}" ]]; then
              bak_path="${lib_path}.ci-bak"
              mv "${lib_path}" "${bak_path}"
              restores+=("${lib_path}:::${bak_path}")
              echo "[smoke] temporarily removed ${lib_path}"
            fi
          done

          unset MPV_LIBRARY TRANSCRIBY_MPV_LIBRARY SLOWPLAY_MPV_LIBRARY DYLD_FALLBACK_LIBRARY_PATH LD_LIBRARY_PATH
          smoke_log="${RUNNER_TEMP}/smoke-check.log"
          TRANSCRIBY_REQUIRE_BUNDLED_MPV=1 "${app_exe}" --smoke-check 2>&1 | tee "${smoke_log}"
          grep -q "smoke-check: bundled libmpv OK (" "${smoke_log}"

      - name: Package artifact
        shell: bash
        run: |
          app_path="dist/Transcriby.app"
          if [[ ! -d "${app_path}" ]]; then
            echo "::error::Expected app bundle not found: ${app_path}"
            ls -la dist || true
            exit 1
          fi

          bundled_mpv="$(find "${app_path}" -type f \( -name 'libmpv.dylib' -o -name 'libmpv.2.dylib' \) | head -n 1 || true)"
          if [[ -z "${bundled_mpv}" ]]; then
            echo "::error::Bundled libmpv.dylib not found in app bundle"
            find "${app_path}" -maxdepth 5 -type f | head -n 200
            exit 1
          fi
          echo "Bundled libmpv: ${bundled_mpv}"

          mkdir -p out
          zip_name="Transcriby-macOS-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "out/${zip_name}"
          shasum -a 256 "out/${zip_name}" > "out/SHA256SUMS-${{ matrix.arch }}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transcriby-macos-${{ matrix.arch }}
          path: |
            out/Transcriby-macOS-${{ matrix.arch }}.zip
            out/SHA256SUMS-${{ matrix.arch }}.txt

  publish:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: transcriby-macos-*
          merge-multiple: true
          path: out

      - name: Verify artifact files exist
        run: |
          ls -la out
          test -f out/Transcriby-macOS-arm64.zip
          test -f out/SHA256SUMS-arm64.txt
          test -f out/Transcriby-macOS-x64.zip
          test -f out/SHA256SUMS-x64.txt

      - name: Publish nightly release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          upload_with_retry() {
            local tag="$1"
            shift
            local attempt
            local rc
            for attempt in 1 2 3 4 5; do
              echo "[release] upload attempt ${attempt}/5 for tag '${tag}'"
              if gh release upload "${tag}" "$@" --clobber -R "${GH_REPO}"; then
                return 0
              fi
              rc=$?
              if [[ "${attempt}" -eq 5 ]]; then
                return "${rc}"
              fi
              sleep $((attempt * 5))
            done
          }

          tag="nightly"
          title="Nightly"
          notes=$'Automated nightly build from `main`.\nCommit: '"${GITHUB_SHA}"
          files=(
            out/Transcriby-macOS-arm64.zip
            out/SHA256SUMS-arm64.txt
            out/Transcriby-macOS-x64.zip
            out/SHA256SUMS-x64.txt
          )

          if gh release view "${tag}" -R "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${title}" --prerelease --latest=false --notes "${notes}" -R "${GH_REPO}"
          else
            gh release create "${tag}" --title "${title}" --prerelease --latest=false --notes "${notes}" -R "${GH_REPO}"
          fi

          upload_with_retry "${tag}" "${files[@]}"

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          upload_with_retry() {
            local tag="$1"
            shift
            local attempt
            local rc
            for attempt in 1 2 3 4 5; do
              echo "[release] upload attempt ${attempt}/5 for tag '${tag}'"
              if gh release upload "${tag}" "$@" --clobber -R "${GH_REPO}"; then
                return 0
              fi
              rc=$?
              if [[ "${attempt}" -eq 5 ]]; then
                return "${rc}"
              fi
              sleep $((attempt * 5))
            done
          }

          tag="${GITHUB_REF_NAME}"
          files=(
            out/Transcriby-macOS-arm64.zip
            out/SHA256SUMS-arm64.txt
            out/Transcriby-macOS-x64.zip
            out/SHA256SUMS-x64.txt
          )

          if ! gh release view "${tag}" -R "${GH_REPO}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --generate-notes -R "${GH_REPO}"
          fi

          upload_with_retry "${tag}" "${files[@]}"
